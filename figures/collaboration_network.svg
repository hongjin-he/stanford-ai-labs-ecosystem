<svg viewBox="0 0 820 520" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica Neue, Arial, sans-serif">
  <defs>
    <marker id="edge-arr" markerWidth="7" markerHeight="7" refX="5" refY="3.5" orient="auto">
      <path d="M0,0 L7,3.5 L0,7 Z" fill="#A0AEC0" opacity="0.8"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect width="820" height="520" fill="#FAFBFC" rx="8"/>

  <!-- Title -->
  <text x="410" y="30" text-anchor="middle" font-size="15" font-weight="700" fill="#1A202C">Stanford AI Labs — Inter-Lab Collaboration Network</text>
  <text x="410" y="47" text-anchor="middle" font-size="10.5" fill="#718096">Node size ∝ team size · Edge weight ∝ joint publication count (2018–2026) · Industry destinations shown</text>
  <line x1="40" y1="58" x2="780" y2="58" stroke="#E2E8F0" stroke-width="1"/>

  <!-- ===== EDGES (drawn behind nodes) ===== -->
  <!-- SAIL-NLP: 38 papers, thick -->
  <line x1="390" y1="168" x2="265" y2="255" stroke="#CBD5E0" stroke-width="5" opacity="0.6"/>
  <text x="316" y="202" font-size="8.5" fill="#718096" transform="rotate(-38,316,202)">38 papers</text>

  <!-- SAIL-SVL: 45 papers, thickest -->
  <line x1="390" y1="168" x2="510" y2="255" stroke="#CBD5E0" stroke-width="6" opacity="0.6"/>
  <text x="460" y="196" font-size="8.5" fill="#718096" transform="rotate(38,460,196)">45 papers</text>

  <!-- SVL-IRIS: 28 papers -->
  <line x1="510" y1="255" x2="530" y2="345" stroke="#CBD5E0" stroke-width="4" opacity="0.5"/>
  <text x="532" y="303" font-size="8.5" fill="#A0AEC0">28</text>

  <!-- IRIS-Robot: 32 papers -->
  <line x1="530" y1="345" x2="400" y2="385" stroke="#CBD5E0" stroke-width="4.5" opacity="0.5"/>
  <text x="472" y="360" font-size="8.5" fill="#A0AEC0">32</text>

  <!-- Robot-NLP: growing -->
  <line x1="400" y1="385" x2="265" y2="255" stroke="#CBD5E0" stroke-width="2.5" opacity="0.4" stroke-dasharray="6,3"/>
  <text x="310" y="330" font-size="8" fill="#A0AEC0">growing</text>

  <!-- NLP-ILIAD: growing -->
  <line x1="265" y1="255" x2="175" y2="345" stroke="#CBD5E0" stroke-width="2" opacity="0.4" stroke-dasharray="5,3"/>

  <!-- StatML-Robot: 18 papers -->
  <line x1="620" y1="355" x2="400" y2="385" stroke="#CBD5E0" stroke-width="3" opacity="0.4"/>
  <text x="520" y="372" font-size="8" fill="#A0AEC0">18</text>

  <!-- ===== LAB NODES ===== -->

  <!-- SAIL (center-top, largest hub) -->
  <circle cx="390" cy="168" r="46" fill="#F6AD55" stroke="#DD6B20" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="390" y="163" text-anchor="middle" font-size="13" font-weight="700" fill="#7B341E">SAIL</text>
  <text x="390" y="178" text-anchor="middle" font-size="9" fill="#7B341E">1963 · hub</text>
  <text x="390" y="191" text-anchor="middle" font-size="8.5" fill="#7B341E">~80 researchers</text>

  <!-- NLP Group (left) -->
  <circle cx="265" cy="255" r="38" fill="#FC8181" stroke="#E53E3E" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="265" y="249" text-anchor="middle" font-size="11" font-weight="700" fill="#742A2A">NLP</text>
  <text x="265" y="263" text-anchor="middle" font-size="8.5" fill="#742A2A">Group</text>
  <text x="265" y="276" text-anchor="middle" font-size="8" fill="#742A2A">LLMs · RLHF</text>

  <!-- SVL (right) -->
  <circle cx="510" cy="255" r="36" fill="#63B3ED" stroke="#3182CE" stroke-width="2.5" filter="url(#shadow)"/>
  <text x="510" y="249" text-anchor="middle" font-size="11" font-weight="700" fill="#1A365D">SVL</text>
  <text x="510" y="264" text-anchor="middle" font-size="8.5" fill="#1A365D">Embodied AI</text>
  <text x="510" y="276" text-anchor="middle" font-size="8" fill="#1A365D">3D Vision</text>

  <!-- StatML (far right) -->
  <circle cx="620" cy="355" r="30" fill="#B794F4" stroke="#6B46C1" stroke-width="2" filter="url(#shadow)"/>
  <text x="620" y="349" text-anchor="middle" font-size="10" font-weight="700" fill="#44337A">StatML</text>
  <text x="620" y="363" text-anchor="middle" font-size="8.5" fill="#44337A">RL Theory</text>
  <text x="620" y="375" text-anchor="middle" font-size="8" fill="#44337A">Offline RL</text>

  <!-- IRIS (center-right) -->
  <circle cx="530" cy="345" r="27" fill="#68D391" stroke="#276749" stroke-width="2" filter="url(#shadow)"/>
  <text x="530" y="340" text-anchor="middle" font-size="10" font-weight="700" fill="#1C4532">IRIS</text>
  <text x="530" y="354" text-anchor="middle" font-size="8.5" fill="#1C4532">Robotics</text>
  <text x="530" y="365" text-anchor="middle" font-size="8" fill="#1C4532">Manipulation</text>

  <!-- SAIL-Robot (bottom-center) -->
  <circle cx="400" cy="385" r="32" fill="#4FD1C5" stroke="#234E52" stroke-width="2" filter="url(#shadow)"/>
  <text x="400" y="379" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4044">SAIL-Robot</text>
  <text x="400" y="392" text-anchor="middle" font-size="8.5" fill="#1D4044">Meta-Learning</text>
  <text x="400" y="403" text-anchor="middle" font-size="8" fill="#1D4044">MAML · #1</text>

  <!-- ILIAD (far left) -->
  <circle cx="175" cy="345" r="27" fill="#F6E05E" stroke="#975A16" stroke-width="2" filter="url(#shadow)"/>
  <text x="175" y="339" text-anchor="middle" font-size="10" font-weight="700" fill="#744210">ILIAD</text>
  <text x="175" y="353" text-anchor="middle" font-size="8.5" fill="#744210">Human-AI</text>
  <text x="175" y="364" text-anchor="middle" font-size="8" fill="#744210">Active Learn.</text>

  <!-- ===== INDUSTRY DESTINATIONS ===== -->
  <!-- From NLP -->
  <rect x="50" y="95" width="90" height="22" rx="4" fill="#FFF5F5" stroke="#FC8181" stroke-width="1"/>
  <text x="95" y="110" text-anchor="middle" font-size="8.5" fill="#742A2A">→ OpenAI</text>
  <line x1="236" y1="232" x2="140" y2="115" stroke="#FC8181" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <rect x="48" y="124" width="92" height="22" rx="4" fill="#FFF5F5" stroke="#FC8181" stroke-width="1"/>
  <text x="94" y="139" text-anchor="middle" font-size="8.5" fill="#742A2A">→ Anthropic</text>
  <line x1="235" y1="238" x2="140" y2="136" stroke="#FC8181" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <rect x="53" y="153" width="88" height="22" rx="4" fill="#FFF5F5" stroke="#FC8181" stroke-width="1"/>
  <text x="97" y="168" text-anchor="middle" font-size="8.5" fill="#742A2A">→ Google DM</text>
  <line x1="234" y1="248" x2="141" y2="162" stroke="#FC8181" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- From SVL -->
  <rect x="640" y="155" width="72" height="22" rx="4" fill="#EBF8FF" stroke="#63B3ED" stroke-width="1"/>
  <text x="676" y="170" text-anchor="middle" font-size="8.5" fill="#1A365D">→ Tesla</text>
  <line x1="544" y1="234" x2="640" y2="165" stroke="#63B3ED" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <rect x="640" y="184" width="82" height="22" rx="4" fill="#EBF8FF" stroke="#63B3ED" stroke-width="1"/>
  <text x="681" y="199" text-anchor="middle" font-size="8.5" fill="#1A365D">→ NVIDIA</text>
  <line x1="546" y1="240" x2="640" y2="193" stroke="#63B3ED" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- From SAIL-Robot -->
  <rect x="400" y="434" width="105" height="22" rx="4" fill="#E6FFFA" stroke="#4FD1C5" stroke-width="1"/>
  <text x="452" y="449" text-anchor="middle" font-size="8.5" fill="#1D4044">→ Phys. Intel.</text>
  <line x1="420" y1="417" x2="430" y2="434" stroke="#4FD1C5" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <rect x="520" y="434" width="108" height="22" rx="4" fill="#E6FFFA" stroke="#4FD1C5" stroke-width="1"/>
  <text x="574" y="449" text-anchor="middle" font-size="8.5" fill="#1D4044">→ Google Robot.</text>
  <line x1="432" y1="414" x2="520" y2="441" stroke="#4FD1C5" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- ===== LEGEND ===== -->
  <rect x="45" y="460" width="730" height="50" rx="5" fill="#F7FAFC" stroke="#E2E8F0" stroke-width="1"/>
  <text x="60" y="477" font-size="9.5" font-weight="600" fill="#4A5568">Node key:</text>
  <circle cx="130" cy="474" r="7" fill="#F6AD55" stroke="#DD6B20" stroke-width="1.5"/>
  <text x="142" y="478" font-size="8.5" fill="#4A5568">SAIL (hub)</text>
  <circle cx="215" cy="474" r="7" fill="#FC8181" stroke="#E53E3E" stroke-width="1.5"/>
  <text x="227" y="478" font-size="8.5" fill="#4A5568">NLP (fastest growing)</text>
  <circle cx="335" cy="474" r="7" fill="#4FD1C5" stroke="#234E52" stroke-width="1.5"/>
  <text x="347" y="478" font-size="8.5" fill="#4A5568">SAIL-Robot (#1 meta-learning)</text>
  <text x="60" y="500" font-size="9" fill="#718096">Edge width ∝ joint papers · Dashed = growing collaboration · Destinations show primary industry talent flow post-PhD</text>
</svg>
